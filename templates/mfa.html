<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecurePortal MFA Verification</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #020504;
            color: #ecfdf5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 10% 0%, rgba(16, 185, 129, 0.1) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 90% 100%, rgba(5, 150, 105, 0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            background: rgba(10, 18, 15, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            width: 100%;
            max-width: 440px;
            border-radius: 28px;
            border: 1px solid rgba(16, 185, 129, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            text-align: center;
        }

        .icon-circle {
            width: 64px;
            height: 64px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 20px auto;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.15);
        }

        .title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: #ecfdf5;
        }

        .subtitle {
            color: #869e94;
            font-size: 0.95rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .otp-inputs {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .otp-inputs input {
            width: 45px;
            height: 55px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            background: #060c0a;
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 14px;
            color: white;
            outline: none;
            transition: all 0.2s;
        }

        .otp-inputs input:focus {
            border-color: #10b981;
            background: #0a120f;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
            transform: translateY(-2px);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: #020504;
            border: none;
            border-radius: 14px;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            margin-bottom: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.6);
            filter: brightness(1.1);
        }

        .btn.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .resend {
            margin-top: 24px;
            font-size: 0.9rem;
            color: #869e94;
        }

        .resend a {
            color: #10b981;
            text-decoration: none;
            font-weight: 700;
            transition: color 0.2s;
            cursor: pointer;
        }

        .resend a:hover {
            color: #34d399;
            text-shadow: 0 0 8px rgba(16, 185, 129, 0.3);
        }

        .error-msg {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="icon-circle">📩</div>
        <div class="title">Verification Required</div>
        <div class="subtitle">We've detected an unusual login. Please enter the 6-digit code sent to your email to
            verify your identity.</div>

        <div class="error-msg" id="errorMsg"></div>

        <form id="mfaForm">
            <div class="otp-inputs" id="otpContainer">
                <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" required autofocus>
                <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
            </div>
            <button class="btn" type="submit" id="submitBtn">Verify Identity</button>
        </form>

        <div class="resend">
            Didn't receive a code? <a id="resendBtn">Resend Code</a>
        </div>
    </div>

    <script>
        // Security: Prevent Back Button Bypass
        // If the user got here, they MUST complete MFA. We replace the current history
        // state so clicking "Back" keeps them on this page instead of showing a cached dashboard.
        window.history.replaceState(null, null, window.location.href);
        window.onpopstate = function (event) {
            window.history.go(1);
        };

        const inputs = document.querySelectorAll('.otp-inputs input');

        // Auto-advance OTP inputs
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            // Allow pasting full 6 digits
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text').slice(0, 6).replace(/[^0-9]/g, '');
                if (pastedData) {
                    for (let i = 0; i < pastedData.length; i++) {
                        inputs[i].value = pastedData[i];
                    }
                    if (pastedData.length === 6) {
                        inputs[5].focus();
                    } else {
                        inputs[pastedData.length].focus();
                    }
                }
            });
        });

        document.getElementById('mfaForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            let code = '';
            inputs.forEach(input => code += input.value);

            if (code.length !== 6) return;

            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');

            submitBtn.classList.add('loading');
            submitBtn.textContent = 'Verifying...';
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('/verify_mfa', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code })
                });

                const data = await res.json();

                if (res.ok && data.status === 'success') {
                    window.location.href = '/dashboard';
                } else {
                    throw new Error(data.message || 'Verification failed. Incorrect code.');
                }

            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
                submitBtn.classList.remove('loading');
                submitBtn.textContent = 'Verify Identity';
                // Clear inputs
                inputs.forEach(input => input.value = '');
                inputs[0].focus();
            }
        });

        document.getElementById('resendBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            const btn = e.target;
            btn.style.pointerEvents = 'none';
            btn.textContent = 'Sending...';

            try {
                const res = await fetch('/resend_mfa', { method: 'POST' });
                if (res.ok) {
                    document.getElementById('errorMsg').style.display = 'block';
                    document.getElementById('errorMsg').style.background = 'rgba(16, 185, 129, 0.1)';
                    document.getElementById('errorMsg').style.borderColor = 'rgba(16, 185, 129, 0.2)';
                    document.getElementById('errorMsg').style.color = '#34d399';
                    document.getElementById('errorMsg').textContent = 'Code resent successfully.';
                }
            } catch (err) { }

            setTimeout(() => {
                btn.textContent = 'Resend Code';
                btn.style.pointerEvents = 'auto';
            }, 30000); // Prevent spamming
        });
    </script>
</body>

</html>
