<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecurePortal Register</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #fdf8f4;
            color: #2d1b02;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 10% 0%, rgba(217, 119, 6, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 90% 100%, rgba(234, 88, 12, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            background: rgba(10, 18, 15, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border-radius: 28px;
            border: 1px solid rgba(16, 185, 129, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            color: #ecfdf5;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .subtitle {
            text-align: center;
            color: #869e94;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            font-size: 0.82rem;
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            color: #10b981;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: #060c0a;
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 14px;
            color: white;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
            background: #0a120f;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: #020504;
            border: none;
            border-radius: 14px;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.6);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(0);
        }

        .register {
            text-align: center;
            margin-top: 24px;
            font-size: 0.9rem;
            color: #869e94;
        }

        .register a {
            color: #10b981;
            text-decoration: none;
            font-weight: 700;
            transition: color 0.2s;
        }

        .register a:hover {
            color: #34d399;
            text-shadow: 0 0 8px rgba(16, 185, 129, 0.3);
        }

        .error-msg {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="logo">
            <div class="logo-icon">🔐</div>
            SecurePortal
        </div>
        <div class="subtitle">Create a new account</div>

        <form method="post">
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose a username" required autocomplete="off">
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="name@example.com" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Choose a password" required>
            </div>

            <button class="btn" type="submit">Create Account</button>
        </form>

        <div class="register">
            Already have an account?
            <a href="/">Sign In</a>
        </div>
    </div>

</body>

</html>
